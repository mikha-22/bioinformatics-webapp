# docker-compose.test.yml
# Minimal compose file for testing the webapp container startup with TLS,
# building the image locally using Dockerfile.webapp.

version: '3.8'

services:
  webapp_test: # Use a different service name to avoid conflicts
    # --- BUILD the image locally ---
    build:
      context: . # Use the current directory as the build context
      dockerfile: ./docker/Dockerfile.webapp # Specify the Dockerfile to use
    # --- END BUILD section ---

    container_name: bio_webapp_test # Use a different container name
    ports:
      # Expose the same port for testing access
      - "${WEBAPP_PORT:-8000}:8000"
    volumes:
      # --- CRUCIAL: Mount the TLS certificates ---
      # This assumes your 'tls' folder with server.key and server.crt
      # exists in the same directory where you run docker-compose
      - ./tls:/app/tls:ro

      # --- Optional: Mount local code for faster testing during development ---
      # These mounts override the code copied during the build process.
      # Remove these if you ONLY want to test the code exactly as built into the image.
      - ./backend:/app/backend:ro
      - ./frontend:/app/frontend:ro
      - ./main.py:/app/main.py:ro
      # - results_vol:/app/bioinformatics/results:ro # Removed: Not needed for TLS startup test

    environment:
      # You might need to set REDIS_HOST if the app tries to connect
      # eagerly at startup, but let's try without it first for minimal test.
      # If startup fails due to Redis connection, uncomment and adjust,
      # or add a basic redis service below.
      # - REDIS_HOST=some_test_redis # Example
      - PYTHONUNBUFFERED=1

    # User directive might still be needed if the image expects it or for volume permissions
    user: "${UID:-1000}:${GID:-1000}"

    # No 'depends_on', 'restart', or 'networks' needed for this minimal test

# No top-level 'networks' or 'volumes' needed for this simple test
