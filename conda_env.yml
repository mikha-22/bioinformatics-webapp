name: bio-webapp
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.9
  - fastapi
  - uvicorn[standard]
  - rq
  - redis
  - jinja2
  - python-multipart
  # Development tools
  - pytest
  - black
  - flake8
  # Note: nextflow, psutil, and bioinformatics tools are installed in the container
  # and not needed for local testing
