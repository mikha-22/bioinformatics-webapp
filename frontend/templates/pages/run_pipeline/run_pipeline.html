<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Run Bioinformatics Pipeline</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="/frontend/static/main.css">
    <link rel="stylesheet" href="/frontend/templates/pages/run_pipeline/run_pipeline.css">
</head>
<body>
    <div class="container mt-5">
        <h1>Run Bioinformatics Pipeline</h1>
        <p class="lead">Please select the required input files for the pipeline. Only files located in the <code>bioinformatics/data</code> directory with the specified extensions will be shown.</p>

        <form id="pipeline-form">
            <div class="form-group">
                <label for="forwardReads">Forward Reads (FASTQ/FASTQ.GZ)</label>
                <select class="form-control" id="forwardReads" required>
                    <option value="" disabled selected>Select Forward Reads File</option>
                </select>
            </div>

            <div class="form-group">
                <label for="reverseReads">Reverse Reads (FASTQ/FASTQ.GZ)</label>
                <select class="form-control" id="reverseReads" required>
                    <option value="" disabled selected>Select Reverse Reads File</option>
                </select>
            </div>

            <div class="form-group">
                <label for="referenceGenome">Reference Genome (FASTA/FASTA.GZ)</label>
                <select class="form-control" id="referenceGenome" required>
                    <option value="" disabled selected>Select Reference Genome File</option>
                </select>
            </div>

            <div class="form-group">
                <label for="targetRegions">Target Regions (BED)</label>
                <select class="form-control" id="targetRegions" required>
                    <option value="" disabled selected>Select Target Regions File</option>
                </select>
            </div>

            <div class="form-group">
                <label for="knownVariants">Known Variants (VCF/VCF.GZ) (Optional)</label>
                <select class="form-control" id="knownVariants">
                    <option value="" disabled selected>Select Known Variants File (Optional)</option>
                    <option value="">None</option>
                </select>
            </div>

            <button type="button" class="btn btn-primary" id="runPipelineBtn" disabled>Run Pipeline</button>
            <div id="pipeline-status" class="mt-3"></div>
        </form>
    </div>

<script src="/frontend/static/main.js"></script>
<script src="/frontend/static/run_pipeline.js"></script>

</body>
</html>
