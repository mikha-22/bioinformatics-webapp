<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Bioinformatics App</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="/frontend/global/styles/main.css">
    </head>
<body>
    <div id="pipeline-status-indicator" class="pipeline-status">
        <div id="pipeline-status-icon">
            <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
        </div>
        <div id="pipeline-status-popup" class="pipeline-status-popup">
            <p>No pipeline currently running.</p>
            <div class="progress">
                <div class="progress-bar" role="progressbar" style="width: 0%" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">0%</div>
            </div>
        </div>
    </div>

    <div class="container mt-5">
        <h1>Welcome to Your Bioinformatics App</h1>
        <p>This is the main page of your application.</p>
        <a href="/run_pipeline" class="btn btn-primary">Run Pipeline</a>
        </div>

    <script src="/frontend/global/scripts/main.js"></script>
    </body>
</html>
