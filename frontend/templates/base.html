<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="/frontend/static/main.css">
    <link rel="icon" href="/frontend/static/favicon.ico" type="image/x-icon">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <a class="navbar-brand" href="/">Bioinformatics Webapp</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item {% if request.url.path == '/' %}active{% endif %}">
                    <a class="nav-link" href="/">Home <span class="sr-only">(current)</span></a>
                </li>
                <li class="nav-item {% if request.url.path == '/run_pipeline' %}active{% endif %}">
                    <a class="nav-link" href="/run_pipeline">Run Pipeline</a>
                </li>
                <li class="nav-item {% if request.url.path == '/results' %}active{% endif %}">
                    <a class="nav-link" href="/results">Results</a>
                </li>
            </ul>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <footer class="mt-5 bg-light text-center py-3">
        <p>&copy; 2025 Bioinformatics Webapp</p>
    </footer>

    <script src="/frontend/static/main.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
