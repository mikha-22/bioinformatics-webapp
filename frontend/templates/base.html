<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="/frontend/static/global/styles/main.css">
    <link rel="icon" href="/frontend/static/favicon.ico" type="image/x-icon">
    {% block head %}{% endblock %}
</head>
<body>
    {% include 'navbar.html' %}

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <footer class="mt-5 bg-light text-center py-3">
        <p>&copy; 2025 Bioinformatics Webapp</p>
    </footer>

    <script src="/frontend/static/main.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
