name: Docker Build and Push to GHCR

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # Set up Docker Buildx for advanced features like caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3 # <-- ADD THIS STEP

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }} # Using PAT as configured

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          # *** IMPORTANT: Ensure Dockerfile path is correct ***
          # If your Dockerfile is in the root: file: ./Dockerfile
          # If your Dockerfile is in ./docker/: file: ./docker/Dockerfile
          file: ./docker/Dockerfile # Adjust this path if your Dockerfile is not in the root!
          push: true
          tags: |
            ghcr.io/mikha-22/bioinformatics-webapp:latest
          # ghcr.io/mikha-22/bioinformatics-webapp:sha-${{ substr(github.sha, 0, 7) }} # Still commented out
          # Cache settings should now work with Buildx set up
          cache-from: type=gha
          cache-to: type=gha,mode=max
